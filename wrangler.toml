name = "urithi-gallery"
compatibility_date = "2026-07-17"
compatibility_flags = ["nodejs_compat"]

# Worker principal : gère l'API /api/save-data et sert les fichiers statiques
main = "_worker.js"

# Actifs statiques (votre site HTML/CSS/JS) — servi via le binding ASSETS
[assets]
directory = "."
binding = "ASSETS"

# Variables non sensibles. Les secrets (GITHUB_TOKEN, ADMIN_PASSWORD) sont à ajouter
# en mode "Secret/Encrypt" dans le dashboard Cloudflare du projet Worker (ou `wrangler secret put`).
[vars]
ADMIN_SECRET = "SecureArtGallery2026!"
# ADMIN_PASSWORD doit être ajouté comme SECRET chiffré (valeur : Administrateur#ArtGallery)
