name = "urithi-gallery"
compatibility_date = "2026-07-17"

# Fichier Worker principal
main = "_worker.js"

# Répertoire des actifs statiques (votre site HTML/CSS/JS)
[assets]
directory = "."
binding = "ASSETS"

# Fonction API pour sauvegarder les données sur GitHub
[functions]
save_data = "./functions/api/save-data.js"

# Route pour exposer la fonction sous /api/save-data
[[routes]]
pattern = "/api/save-data"
function = "save_data"
