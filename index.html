<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Gallery</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        background-color: #BC6C25;
        background-image: linear-gradient(134deg, #bc6c2500 0%, #BC6C25 100%), radial-gradient(#fefadf12 2px, #fefadf00 2px);
        background-size: 100% 100%, 10px 10px;
        background-position: center, 0 0;
        background-attachment: fixed;
    }
    section{
        width: 100%;
        height: 100svh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        
    }
    .container{
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        color: #FEFADF;
        font-family: sans-serif;
        gap: 20px;
        position: relative;
        z-index: 100;
        width: 300px;
        padding: 20px 40px;
        border-radius: 6px;
        background-color: #6d3503db;
    }
    h1{
        font-size: 22px;

    }
    .Illust_1{
        width: 258px;
        position: absolute;
        z-index: 1;
    }
</style>
<body>
    <section>
        <div class="container">
            <img src="./assets/images/Logo-ArtGallery.svg" alt="">
            <h1>Site en construction</h1>
            <p>Revenez plus tard !</p>
        </div>
        <img class="Illust_1" src="./assets/images/Illust_1.png" alt="">
    </section>
</body>
</html>
